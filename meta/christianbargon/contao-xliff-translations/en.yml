en:
    title: Contao2xliff
    description: >
        Easily export and reimport Contao content as XLIFF files (v1.2 & v2.0) – compatible with DeepL and popular translation agencies.
        Supports all core modules as well as many third-party extensions, Isotope product data, and takes user rights and versioning into account.
        New: Export/import of modules, skip hidden content during export.
    keywords:
        - translation-agency
        - XLIFF
        - translation
        - export
        - import
        - Isotope
        - DeepL
    homepage: https://contao2xliff.de
