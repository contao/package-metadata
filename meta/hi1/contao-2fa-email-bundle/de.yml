de:
    title: "HI¹ 2FA Email Bundle"
    description: >
        Das HI¹ 2FA Email Bundle fügt deinem Contao-Backend die Option hinzu, 2FA Codes via Email zu erhalten. Es kann jederzeit zwischen Email und TOTP 2FA gewechselt werden.
        In den Systemeinstellungen gibt es zusätzlich die Option, 2FA für alle User zu verpflichten.
    keywords:
