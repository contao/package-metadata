        - backend
        - login
        - security
    support:
        issues: "https://github.com/hi1-yildiz/contao-2fa-email-bundle/issues"
        source: "https://github.com/hi1-yildiz/contao-2fa-email-bundle#"
    homepage: "https://hi1.at/"
