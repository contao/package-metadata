en:
    title: "HI¹ 2FA Email Bundle"
    description: >
        The HI¹ 2FA Email Bundle adds the option to receive 2FA codes via email to your Contao backend. You can switch between email and TOTP 2FA at any time. Additionally, in the system settings there is an option to enforce 2FA for all users.
