en:
    title: MetaModels Dropzone File Upload
    description: >
        The Dropzone extension enables convenient drag-and-drop file upload for the MetaModels file attribute.
        Particularly useful in frontend editing, where users can upload files via drag and drop.
    keywords:
        - metamodels
        - dropzone
        - upload
        - drag drop
        - file
    homepage: https://now.metamodel.me
    support:
        docs: https://metamodels.readthedocs.io/de/latest/
