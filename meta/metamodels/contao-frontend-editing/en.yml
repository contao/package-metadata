en:
    title: MetaModels Frontend Editing
    description: >
        The frontend editing module allows MetaModels records to be created, edited, and deleted directly in the
        Contao frontend. The module integrates seamlessly into MetaModels and uses dc-general as the data
        container.

        More about the installation and working with frontend editing in our manual at
        https://metamodels.readthedocs.io/de/latest/manual/extended/frontend_editing.html
    keywords:
        - metamodels
        - frontend-editing
        - FEE
        - frontend
        - edit
    homepage: https://now.metamodel.me
    support:
        docs: https://metamodels.readthedocs.io/de/latest/manual/extended/cowegis-layer-marker.html
