de:
    title: MetaModels Core
    description: >
        Beliebige strukturierte Inhalte in Contao verwalten — ohne Programmierung,
        ohne externe Entwickler.

        Wer eigene Felder, Filterung, Sortierung und mehrsprachige Ausgabe braucht, findet in
        MetaModels eine fertige Lösung: Datenmodell und Ausgabe werden im Backend eingerichtet,
        nicht im Code.
    keywords:
        - metamodels
        - core
        - catalog
        - katalog
    homepage: https://now.metamodel.me
    support:
        docs: https://metamodels.readthedocs.io/de/latest/
