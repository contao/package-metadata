en:
    title: MetaModels core
    description: >
        Manage any structured content in Contao — without programming, without external developers.

        Anyone needing custom fields, filtering, sorting, and multilingual output will find a
        ready-made solution in MetaModels: data model and output are configured in the back end,
        not in code.
    keywords:
        - metamodels
        - core
        - catalog
        - katalog
    homepage: https://now.metamodel.me
    support:
        docs: https://metamodels.readthedocs.io/en/latest/
