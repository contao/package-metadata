de:
    title: MetaModels Attribut Einfachauswahl [select]
    description: >
        Das Attribut Einfachauswahl ermöglicht die Auswahl eines einzelnen Wertes aus einer verknüpften
        MetaModels-Tabelle oder einer eigenen Tabelle. Es ist als Fremdschlüssel-Beziehung zu verstehen.
    keywords:
        - metamodels
        - attribute
        - select
        - einfachauswahl
        - foreign key
    homepage: https://now.metamodel.me
    support:
        docs: https://metamodels.readthedocs.io/de/latest/manual/component/attribute/select.html
