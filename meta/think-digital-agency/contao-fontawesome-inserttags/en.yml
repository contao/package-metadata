en:
    title: Contao FontAwesome Insert Tags
    description: >
        No more copying HTML tags. FontAwesome icons belong directly in Contao fields — via insert tag, everywhere, without an HTML module.

        Simply add an insert tag to any text field, headline, navigation label or RSCE template — done. Solid, Regular and Brands styles are all supported. Optional modifier classes can be added directly in the insert tag. All inputs are validated and XSS-safe.
    keywords:
        - fontawesome
        - fontawesome 6
        - font awesome
        - icons
        - insert tag
        - svg icons
        - fa icons
        - icon
    support:
        issues: https://github.com/think-digital-agency/contao-fontawesome-inserttags/issues
        docs: https://github.com/think-digital-agency/contao-fontawesome-inserttags#readme
