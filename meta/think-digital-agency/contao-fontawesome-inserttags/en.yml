en:
    title: Contao FontAwesome Insert Tags
    description: >
        No more copying HTML tags. FontAwesome icons belong directly in Contao fields — via insert tag, everywhere, without an HTML module.

        Simply type {{fas::rocket}}, {{far::circle-check}} or {{fab::github}} into any text field, headline, navigation label or RSCE template — done. Optional modifiers directly in the tag: {{fas::spinner::spin::2x}} produces a spinning, double-sized icon. All four FontAwesome styles are supported: Solid, Regular, Brands and the generic fa tag for v4 compatibility. All inputs are regex-validated and XSS-safe.
    keywords:
        - fontawesome
        - fontawesome 6
        - font awesome
        - icons
        - insert tag
        - svg icons
        - fa icons
        - icon
    support:
        issues: https://github.com/think-digital-agency/contao-fontawesome-inserttags/issues
        docs: https://github.com/think-digital-agency/contao-fontawesome-inserttags#readme
