title: Contao Live Preview
description: |
  Live preview panel and frontend editor for the Contao 5 backend – view, hover and edit articles, content elements and frontend modules directly in an iFrame.

  Open a page, article or content element and the panel immediately shows the matching frontend page – no configuration, no extra click. Save a record and only that article is swapped live inside the running iFrame: no reload, no scroll jump, native feel. Hover over any element in the preview and a badge shows its type and name – click the pencil to open the edit form directly.
keywords:
