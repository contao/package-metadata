de:
    title: Contao Content Visibility
    description: >
        Schränkt die Sichtbarkeit von Inhaltselementen im Contao-Backend basierend auf Backend-Benutzergruppen ein.
        Eingeschränkte Elemente werden für betroffene Benutzer aus den Listen ausgeblendet. Administratoren sind immer ausgenommen.
    keywords:
        - contao
        - contao5
        - backend
        - tl_content
        - berechtigungen
        - benutzergruppen
        - zugriffskontrolle
    support:
        issues: https://github.com/GreenEffect/contao-content-visibility/issues
        docs: https://github.com/GreenEffect/contao-content-visibility/tree/main/docs/en

