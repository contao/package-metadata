  <!-- gefuellte Pfeilspitze: Basis quer zur Tangente, Spitze entlang der Tangente (freigegebene Version) -->
  <path d="M96.5 69.7 L116.2 73.2 L103.2 89.2 Z" fill="#ffffff" fill-opacity="0.85"/>
  <!-- Checkbox -->
  <rect x="39" y="39" width="50" height="50" rx="13" fill="#ffffff"/>
  <path d="M50.5 65 L60 74.5 L78.5 52.5"
        fill="none" stroke="#F6821F" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
