en:
  title: Contao Autolink
  description: >
    Defines keywords in the Contao back end that are automatically turned into
    links in the front end – internal links to a Contao page, external links to
    a URL or a styled <span>. One code base for the Contao LTS versions
    4.13, 5.3 and 5.7.
  keywords:
    - contao
    - autolink
    - links
    - seo
    - keywords
